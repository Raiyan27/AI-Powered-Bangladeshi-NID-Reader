app:
  name: "Bangladesh NID Extractor"
  version: "1.0.0"

backend:
  host: "0.0.0.0"
  port: 8000
  max_upload_size_mb: 10
  supported_formats:
    - "jpg"
    - "jpeg"
    - "png"
  min_image_dimension: 100
  max_image_dimension: 6000
  cors_origins:
    - "http://localhost:3000"

frontend:
  port: 3000
  api_url: "http://localhost:8000"

ocr:
  languages:
    - "en"
    - "bn"
  use_gpu: false
  confidence_threshold: 0.5

vision:
  default_model: "google/gemini-2.5-flash"
  max_tokens: 2048
  temperature: 0.1
